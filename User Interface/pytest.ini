# Pytest Configuration for India Earth-Observation Intelligence System
# This file configures pytest test discovery and execution behavior

[pytest]
# Test discovery settings
testpaths = tests                    # Directory containing test files
python_files = test_*.py            # Pattern for test file names
python_classes = Test*              # Pattern for test class names
python_functions = test_*           # Pattern for test function names

# Command-line options applied to all test runs
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Custom test markers for categorizing tests
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific functionality
    integration: Integration tests for component interaction
